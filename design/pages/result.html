<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>결과 — Timeleap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600&family=Caveat:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
</head>
<body>
<div class="app" data-theme="paper">
  <div class="paper-grain"></div>
  <div id="nav-root"></div>

  <div class="screen result-screen">
    <div class="result-hero">
      <div class="container-narrow">
        <div class="result-stamp-row">
          <span class="stamp" id="r-stamp"></span>
          <span class="result-date" id="r-date"></span>
        </div>
        <div class="result-place" id="r-place"></div>
        <h1 class="result-title" id="r-title"></h1>
        <div class="result-author" id="r-author"></div>
      </div>
    </div>

    <div class="result-body">
      <div class="container-narrow" id="r-body"></div>
    </div>

    <div class="result-footer" id="r-footer" style="display:none">
      <div class="container-narrow">
        <div class="result-tags" id="r-tags"></div>
        <div class="visibility-card">
          <div>
            <div class="vis-title">이 여행기를 공개할까요?</div>
            <div class="vis-sub" id="vis-sub">나만 볼 수 있습니다. 언제든 변경 가능해요.</div>
          </div>
          <button class="toggle" id="vis-toggle" onclick="toggleVisibility()">
            <span class="toggle-knob"></span>
            <span class="toggle-label-left">비공개</span>
            <span class="toggle-label-right">공개</span>
          </button>
        </div>
        <div class="result-actions">
          <button class="btn btn-ghost" id="like-btn" onclick="toggleLike()">♡ 좋아요</button>
          <button class="btn btn-ghost">↑ 공유</button>
          <button class="btn btn-primary" id="save-btn" onclick="saveResult()">✓ 내 여행기에 저장</button>
        </div>
        <div class="result-next">
          <button class="btn btn-ghost btn-big" onclick="Router.go('timemachine')">✦ 다시 떠나기</button>
          <button class="btn btn-ghost btn-big" onclick="Router.go('profile')">내 여행기 보기 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/state.js"></script>
<script src="../js/router.js"></script>
<script src="../js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNav('');

  const params = Router.getParams();
  const profile = State.getProfile();
  const result = generateResult({ era: params.era, country: params.country, name: profile.name || '나' });
  const era = ERAS.find(e => e.id === result.era);
  const country = COUNTRIES.find(c => c.code === result.country);

  // Header
  document.getElementById('r-stamp').textContent = `ARRIVED · ${era.year}`;
  document.getElementById('r-date').textContent = result.date;
  document.getElementById('r-place').innerHTML =
    `<span class="result-flag">${country.flag}</span><span>${country.name} · ${result.city}</span><span class="result-divider">/</span><span>${era.emoji} ${era.title}</span>`;
  document.getElementById('r-title').textContent = result.title;
  document.getElementById('r-author').innerHTML =
    `<div class="feed-avatar">${(profile.name||'나').slice(0,1)}</div><span>${profile.name||'나'}의 여행기</span>`;

  // Streaming
  const body = document.getElementById('r-body');
  const photos = result.photos;
  const diary = result.diary;

  // Build interleaved sequence
  const seq = [];
  let pi = 0, di = 0;
  while (pi < photos.length || di < diary.length) {
    if (pi < photos.length) { seq.push({ kind: 'photo', idx: pi }); pi++; }
    if (di < diary.length)  { seq.push({ kind: 'para',  idx: di }); di++; }
    if (di < diary.length && (di / diary.length) < (pi / photos.length)) {
      seq.push({ kind: 'para', idx: di }); di++;
    }
  }

  // Render placeholders
  seq.forEach((s, i) => {
    if (s.kind === 'photo') {
      const div = document.createElement('div');
      div.className = 'result-photo-wrap pending';
      div.id = `seq-${i}`;
      div.innerHTML = `<div class="photo-developing"><div class="developing-inner"><div class="dev-shimmer"></div><div class="dev-label">📷 현상 중…</div></div></div>`;
      body.appendChild(div);
    } else {
      const p = document.createElement('p');
      p.className = 'result-para';
      p.id = `seq-${i}`;
      p.style.display = 'none';
      body.appendChild(p);
    }
  });

  // Status
  const status = document.createElement('div');
  status.className = 'result-status';
  status.innerHTML = `<div class="status-dots"><span></span><span></span><span></span></div><span>타임머신이 기억을 정리하는 중…</span>`;
  body.appendChild(status);

  let liked = false, isPublic = false, saved = false;

  async function runStream() {
    for (let i = 0; i < seq.length; i++) {
      const s = seq[i];
      const el = document.getElementById(`seq-${i}`);
      if (s.kind === 'photo') {
        await sleep(800);
        const photo = photos[s.idx];
        el.className = 'result-photo-wrap shown';
        el.innerHTML = `
          <figure class="result-photo photo photo-tilt-${s.idx % 3}">
            <div class="photo-inner">
              ${placeholderPhoto(photo.palette, s.idx * 7 + 3)}
            </div>
            <figcaption class="photo-caption">${photo.scene}</figcaption>
          </figure>`;
      } else {
        const text = diary[s.idx];
        el.style.display = '';
        await sleep(400);
        await typeText(el, text);
      }
    }
    status.remove();
    document.getElementById('r-footer').style.display = '';
    // Tags
    document.getElementById('r-tags').innerHTML =
      result.tags.map(t => `<span class="chip">${t}</span>`).join('');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function typeText(el, text) {
    return new Promise(resolve => {
      let i = 0;
      const speed = 18;
      const id = setInterval(() => {
        i++;
        el.innerHTML = text.slice(0, i) + `<span class="caret">▎</span>`;
        if (i >= text.length) {
          clearInterval(id);
          el.textContent = text;
          resolve();
        }
      }, speed);
    });
  }

  function toggleVisibility() {
    isPublic = !isPublic;
    const toggle = document.getElementById('vis-toggle');
    toggle.classList.toggle('on', isPublic);
    document.getElementById('vis-sub').textContent = isPublic
      ? '공개 갤러리에 노출됩니다.'
      : '나만 볼 수 있습니다. 언제든 변경 가능해요.';
  }

  function toggleLike() {
    liked = !liked;
    const btn = document.getElementById('like-btn');
    btn.textContent = liked ? '♥ 좋아요 표시됨' : '♡ 좋아요';
    btn.classList.toggle('liked', liked);
  }

  function saveResult() {
    if (saved) return;
    saved = true;
    State.addDiary({ ...result, isPublic });
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ 저장됨';
    btn.classList.add('saved');
    btn.disabled = true;
  }

  runStream();
</script>
</body>
</html>
