<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>로그인 — Timeleap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <style>
      body {
        background: var(--night);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="star-grain"></div>

      <div class="screen auth-screen">
        <div class="auth-card">
          <button
            class="brand brand-big"
            onclick="Router.go('landing')"
            style="
              background: none;
              border: 0;
              cursor: pointer;
              display: flex;
              align-items: center;
              gap: 14px;
              margin-bottom: 30px;
            "
          >
            <div class="brand-mark"></div>
            <div>
              <div
                style="
                  font-family: var(--f-display);
                  font-size: 26px;
                  font-weight: 500;
                  color: var(--ink);
                "
              >
                Timeleap
              </div>
              <small
                style="
                  font-family: var(--f-mono);
                  font-size: 9px;
                  letter-spacing: 0.12em;
                  opacity: 0.55;
                  text-transform: uppercase;
                "
                >ARCHIVE OF IMPOSSIBLE DAYS</small
              >
            </div>
          </button>

          <div class="auth-ticket-peek">
            <div class="peek-stamp" style="margin-bottom: 18px">
              <span class="stamp">BOARDING</span>
            </div>
            <h1 class="auth-title">탑승을 시작합니다</h1>
            <p class="auth-sub">
              이 여권은 한 번만 만들면 어디든 갈 수 있어요.<br />
              Google 계정으로 1분 안에 시작하세요.
            </p>
          </div>

          <button
            class="btn btn-primary btn-big auth-google"
            onclick="handleLogin()"
            style="width: 100%; margin-top: 10px"
          >
            <span
              style="font-size: 18px; display: inline-flex; align-items: center"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                style="margin-right: 8px"
              >
                <path
                  fill="#4285F4"
                  d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
                />
                <path
                  fill="#34A853"
                  d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
                />
                <path
                  fill="#FBBC05"
                  d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"
                />
                <path
                  fill="#EA4335"
                  d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"
                />
              </svg>
            </span>
            Google로 계속하기
          </button>

          <div class="auth-terms">
            계속하면 <a href="#">이용약관</a>과
            <a href="#">개인정보처리방침</a>에 동의하게 됩니다. 당신의 얼굴
            사진은 암호화되어 저장되며 <strong>언제든 완전히 삭제</strong>할 수
            있습니다.
          </div>

          <button class="auth-back" onclick="Router.go('landing')">
            ← 돌아가기
          </button>
        </div>

        <div class="auth-deco">
          <div class="auth-deco-ticket auth-deco-ticket-1">
            <div class="mini-ticket-label">PARIS · 1925</div>
          </div>
          <div class="auth-deco-ticket auth-deco-ticket-2">
            <div class="mini-ticket-label">TOKYO · 1968</div>
          </div>
          <div class="auth-deco-ticket auth-deco-ticket-3">
            <div class="mini-ticket-label">NYC · 1977</div>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/state.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/components.js"></script>
    <script>
      function handleLogin() {
        // 이미 온보딩 완료된 경우 타임머신으로
        const profile = State.getProfile();
        if (profile.hasFace) {
          Router.go("timemachine");
        } else {
          Router.go("onboarding");
        }
      }
    </script>
  </body>
</html>
