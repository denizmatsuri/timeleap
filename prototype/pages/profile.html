<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>내 기록 — Timeleap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
</head>
<body>
<div class="app" data-theme="paper">
  <div class="paper-grain"></div>
  <div id="nav-root"></div>

  <div class="screen profile-screen">
    <!-- Hero -->
    <section class="profile-hero">
      <div class="container">
        <div class="profile-card" id="profile-card"></div>
        <div class="stamp-collection">
          <div class="stamp-collection-label">수집된 도장</div>
          <div class="stamp-collection-grid" id="stamp-grid"></div>
        </div>
      </div>
    </section>

    <!-- Diaries -->
    <section class="profile-diaries">
      <div class="container">
        <div class="section-head">
          <h2 class="section-title">나의 여행 기록</h2>
          <div class="section-filters" id="vis-filters"></div>
        </div>
        <div id="diary-content"></div>
      </div>
    </section>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/state.js"></script>
<script src="../js/router.js"></script>
<script src="../js/components.js"></script>
<script>
  document.getElementById('nav-root').innerHTML = renderNav('profile');

  const profile = State.getProfile();
  const diaries = State.getDiaries();
  let visFilter = 'all';

  const stats = {
    trips: diaries.length,
    eras: new Set(diaries.map(d => d.era)).size,
    countries: new Set(diaries.map(d => d.country)).size,
    likes: diaries.reduce((s,d) => s + (d.likes||0), 0),
  };

  // Profile card
  document.getElementById('profile-card').innerHTML = `
    <div class="profile-photo">
      ${placeholderPhoto(['#c9944a','#f4b860','#3a2e20'], 5, 'portrait')}
    </div>
    <div class="profile-info">
      <div class="section-label">TRAVELER</div>
      <h1 class="profile-name">${profile.name || '여행자'}</h1>
      <div class="profile-meta">
        <span>${profile.ageRange||'–'}</span><span>·</span>
        <span>${profile.gender||'–'}</span><span>·</span>
        <span>가입 2026.04</span>
      </div>
      <div class="profile-stats">
        <div><strong>${stats.trips}</strong><span>여행</span></div>
        <div><strong>${stats.eras}</strong><span>시대</span></div>
        <div><strong>${stats.countries}</strong><span>나라</span></div>
        <div><strong>${stats.likes}</strong><span>받은 좋아요</span></div>
      </div>
    </div>
    <div class="profile-actions">
      <button class="btn btn-primary" onclick="Router.go('timemachine')">✦ 다시 떠나기</button>
      <button class="btn btn-ghost btn-tiny" onclick="Router.go('settings')">⚙ 설정</button>
    </div>`;

  // Stamps
  document.getElementById('stamp-grid').innerHTML = ERAS.map(e => {
    const visited = diaries.some(d => d.era === e.id);
    return `<div class="mini-stamp${visited?' visited':''}">
      <div class="mini-stamp-emoji">${e.emoji}</div>
      <div class="mini-stamp-label">${e.label}</div>
    </div>`;
  }).join('');

  // Filters
  function renderFilters() {
    document.getElementById('vis-filters').innerHTML =
      [['all','전체'],['public','공개'],['private','비공개']].map(([v,l]) =>
        `<button class="filter-chip${visFilter===v?' active':''}" onclick="setFilter('${v}')">${l}</button>`
      ).join('');
  }

  function setFilter(v) {
    visFilter = v;
    renderFilters();
    renderDiaries();
  }

  function renderDiaries() {
    const filtered = diaries.filter(d => {
      if (visFilter === 'public') return d.isPublic;
      if (visFilter === 'private') return !d.isPublic;
      return true;
    });
    const el = document.getElementById('diary-content');
    if (filtered.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <svg width="28" height="28" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h7a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a2 2 0 0 1 0-4h7"/></svg>
          <div class="empty-title">아직 여행 기록이 없어요</div>
          <div class="empty-sub">첫 여행을 떠나 기록을 만들어 보세요.</div>
          <button class="btn btn-primary" onclick="Router.go('timemachine')">✦ 첫 여행 떠나기</button>
        </div>`;
    } else {
      el.innerHTML = `<div class="diary-grid">${filtered.map(d => feedCard(d)).join('')}</div>`;
    }
  }

  renderFilters();
  renderDiaries();
</script>
</body>
</html>
